#   - IscB classification: NOT a recombinase; corrected to N5_RNA_Guided_Nuclease
#   - IscB total_aa: 400 (was 410; per UniProt K9VH02)
#   - IscB modules: HNH_catalytic_compact removed (DSB-creating; excluded from writers)


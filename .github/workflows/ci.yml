name: CI

on:
  push:
    branches: [main]
    tags:     ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy

      - name: Ruff — lint
        run: ruff check pen_assemble/ tests/

      - name: Ruff — format check
        run: ruff format --check pen_assemble/ tests/

      - name: mypy — type check
        run: mypy pen_assemble/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run test suite
        run: pytest tests/ -v --tb=short --cov=pen_assemble --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PEN-ASSEMBLE ${{ github.ref_name }}"
          body: |
            ## PEN-ASSEMBLE ${{ github.ref_name }}

            IS110-family bridge recombinase design pipeline.

            **Results summary (v0.5.0)**
            - 1,029 designs scored across 4 strategies (A–D)
            - 16 designs beat IS621 verbatim lockpoint (PenScore > 0.929)
            - 5/5 pre-registered predictions **PASS** — *"PUBLISH with strong claim"*
            - Top design: IS621_deimmunized_v2 (PenScore = 0.9673)

            **Install**
            ```bash
            pip install pen-assemble==${{ github.ref_name }}
            ```

            See [README.md](README.md) and `catalog/release_v0.5.0/` for the full design catalog.
          files: dist/*
          draft: false
          prerelease: false
